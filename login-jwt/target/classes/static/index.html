<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT 登录演示</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.2/dist/axios.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 40px 16px;
        }
        .container { max-width: 460px; margin: 0 auto; }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .08);
            padding: 28px;
            margin-bottom: 20px;
        }
        h1 { font-size: 22px; margin: 0 0 4px; color: #1f2937; }
        .subtitle { color: #6b7280; font-size: 13px; margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: #374151; margin: 12px 0 6px; }
        input {
            width: 100%; padding: 10px 12px; border: 1px solid #d1d5db;
            border-radius: 8px; font-size: 14px;
        }
        input:focus { outline: none; border-color: #2563eb; }
        .btn-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
        button {
            flex: 1; min-width: 120px; padding: 10px 14px; border: none; border-radius: 8px;
            font-size: 14px; cursor: pointer; transition: opacity .2s;
        }
        button:hover { opacity: .88; }
        .primary { background: #2563eb; color: #fff; }
        .ghost { background: #e5e7eb; color: #374151; }
        .danger { background: #ef4444; color: #fff; }
        .ok { background: #10b981; color: #fff; }
        .token-box {
            background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px;
            padding: 10px; font-size: 11px; word-break: break-all; color: #6b7280;
            margin-top: 8px; line-height: 1.5;
        }
        .log {
            background: #1e293b; color: #e2e8f0; border-radius: 8px; padding: 14px;
            font-size: 12px; font-family: monospace; white-space: pre-wrap;
            max-height: 240px; overflow-y: auto; line-height: 1.6;
        }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; }
        .badge.on { background: #d1fae5; color: #065f46; }
        .badge.off { background: #fee2e2; color: #991b1b; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    </style>
</head>
<body>
<div id="app" class="container">
    <div class="card">
        <h1>JWT 登录演示</h1>
        <div class="subtitle">Access Token + Refresh Token · 端口 8081</div>

        <div class="row">
            <span>登录状态</span>
            <span class="badge" :class="accessToken ? 'on' : 'off'">
                {{ accessToken ? '已登录' : '未登录' }}
            </span>
        </div>

        <label>用户名</label>
        <input v-model="form.username" placeholder="请输入用户名" />
        <label>密码</label>
        <input v-model="form.password" type="password" placeholder="请输入密码" />

        <div class="btn-row">
            <button class="ok" @click="register">注册并登录</button>
            <button class="primary" @click="login">登录</button>
        </div>
        <div class="btn-row">
            <button class="ghost" @click="getProfile">获取用户信息</button>
            <button class="ghost" @click="refresh">手动刷新 Token</button>
            <button class="danger" @click="logout">登出</button>
        </div>
    </div>

    <div class="card" v-if="accessToken">
        <label>Access Token（短期）</label>
        <div class="token-box">{{ accessToken }}</div>
        <label>Refresh Token（长期，存 Redis）</label>
        <div class="token-box">{{ refreshToken }}</div>
    </div>

    <div class="card">
        <label>请求日志</label>
        <div class="log">{{ logText }}</div>
    </div>
</div>

<script>
    // 业务请求统一走 api 实例；401 时自动用 Refresh Token 刷新并重发，业务无感
    const api = axios.create({ baseURL: '' });

    new Vue({
        el: '#app',
        data: {
            form: { username: 'alice', password: '123456' },
            accessToken: localStorage.getItem('accessToken') || '',
            refreshToken: localStorage.getItem('refreshToken') || '',
            logs: []
        },
        computed: {
            logText() {
                return this.logs.length ? this.logs.join('\n') : '（暂无日志）';
            }
        },
        created() {
            // 请求拦截器：自动带上 Access Token
            api.interceptors.request.use(config => {
                if (this.accessToken && !config._skipAuth) {
                    config.headers.Authorization = 'Bearer ' + this.accessToken;
                }
                return config;
            });
            // 响应拦截器：401 自动刷新一次并重发原请求
            api.interceptors.response.use(
                resp => resp,
                async error => {
                    const cfg = error.config;
                    if (error.response && error.response.status === 401 && !cfg._retry && this.refreshToken) {
                        cfg._retry = true;
                        this.log('Access Token 失效，尝试用 Refresh Token 刷新...');
                        const ok = await this.doRefresh();
                        if (ok) {
                            cfg.headers.Authorization = 'Bearer ' + this.accessToken;
                            return api(cfg);
                        }
                    }
                    return Promise.reject(error);
                }
            );
        },
        methods: {
            log(msg) {
                const t = new Date().toLocaleTimeString();
                this.logs.unshift('[' + t + '] ' + msg);
            },
            saveTokens(data) {
                this.accessToken = data.accessToken;
                this.refreshToken = data.refreshToken;
                localStorage.setItem('accessToken', data.accessToken);
                localStorage.setItem('refreshToken', data.refreshToken);
            },
            clearTokens() {
                this.accessToken = '';
                this.refreshToken = '';
                localStorage.removeItem('accessToken');
                localStorage.removeItem('refreshToken');
            },
            async register() {
                try {
                    const { data } = await api.post('/api/auth/register', this.form, { _skipAuth: true });
                    if (data.code === 0) { this.saveTokens(data.data); this.log('注册并登录成功'); }
                    else { this.log('注册失败: ' + data.message); }
                } catch (e) { this.log('注册异常: ' + e.message); }
            },
            async login() {
                try {
                    const { data } = await api.post('/api/auth/login', this.form, { _skipAuth: true });
                    if (data.code === 0) { this.saveTokens(data.data); this.log('登录成功'); }
                    else { this.log('登录失败: ' + data.message); }
                } catch (e) { this.log('登录异常: ' + e.message); }
            },
            async getProfile() {
                try {
                    const { data } = await api.get('/api/user/profile');
                    this.log('用户信息: ' + JSON.stringify(data.data));
                } catch (e) {
                    this.log('获取失败（可能未登录）: ' + (e.response ? e.response.status : e.message));
                }
            },
            async doRefresh() {
                try {
                    const { data } = await api.post('/api/auth/refresh',
                        { refreshToken: this.refreshToken }, { _skipAuth: true });
                    if (data.code === 0) { this.saveTokens(data.data); this.log('刷新成功，已获取新 Access Token'); return true; }
                    this.log('刷新失败: ' + data.message); this.clearTokens(); return false;
                } catch (e) { this.log('刷新异常，需重新登录'); this.clearTokens(); return false; }
            },
            async refresh() {
                if (!this.refreshToken) { this.log('无 Refresh Token，请先登录'); return; }
                await this.doRefresh();
            },
            async logout() {
                try {
                    await api.post('/api/auth/logout', {}, { headers: { 'X-Refresh-Token': this.refreshToken }, _skipAuth: true });
                    this.log('已登出，Refresh Token 已从 Redis 删除');
                } catch (e) { this.log('登出异常: ' + e.message); }
                this.clearTokens();
            }
        }
    });
</script>
</body>
</html>
