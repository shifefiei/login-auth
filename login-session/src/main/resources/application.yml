server:
  port: 8082

spring:
  application:
    name: login-session

  # ===== 数据库（MySQL）配置：请自行补全 url / username / password =====
  datasource:
    url: jdbc:mysql://${db_host}:3306/login_auth?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${db_user}
    password: ${db_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ===== Redis 配置：请自行补全 host / port / password =====
  data:
    redis:
      host: ${redis_host}
      port: 6379
      password: ${redis_password}
      database: 1

  # ===== Spring Session 使用 Redis 存储 =====
  session:
    store-type: redis
    timeout: 30m
    redis:
      namespace: spring:session:login-session

# ===== MyBatis Plus 配置 =====
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 控制台打印 SQL，生产可移除
  global-config:
    db-config:
      id-type: auto

# ===== 应用配置（当前为本地开发值，注释标注线上应改成的值）=====
app:
  cookie:
    # 本地 HTTP 用 false；线上：true（HTTPS 环境必须开启 Secure）
    secure: false
    # 同源/子域名共享用 Lax；线上前后端不同主域名跨站时：None（需配合 secure=true）
    same-site: Lax
    # 单域名留空；线上多子域名共享时填正则，如 ^.+?\.(\w+\.[a-z]+)$
    domain-pattern: ""
  cors:
    # 同源部署留空（不触发 CORS）；线上前后端分离时填前端 Origin，逗号分隔，如 https://web.example.com
    allowed-origins: ""
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"

logging:
  level:
    # 本地 debug 方便排查；线上建议 warn
    com.example.session: debug
